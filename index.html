// ── STORAGE ───────────────────────────────────────────────────────────────────
function lsGet(k, fb) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; }
}
function lsSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}
function loadProgress()          { return lsGet("sk_prog", {}); }
function saveProgress(kn, le)    { lsSet("sk_prog", { known:[].concat(Array.from(kn)), learning:[].concat(Array.from(le)) }); }
function loadStats()             { return lsGet("sk_stats", {}); }
function saveStats(s)            { lsSet("sk_stats", s); }
function loadPlan()              { return lsGet("sk_plan", { dailyGoal:10 }); }
function savePlan(p)             { lsSet("sk_plan", p); }
function todayKey()              { return new Date().toISOString().slice(0,10); }
function recordActivity(correct) {
  var s = loadStats();
  var k = todayKey();
  if (!s[k]) s[k] = { seen:0, correct:0 };
  s[k].seen++;
  if (correct) s[k].correct++;
  var keys = Object.keys(s).sort();
  if (keys.length > 30) keys.slice(0, keys.length-30).forEach(function(key){ delete s[key]; });
  saveStats(s);
}

// ── PRONUNCIATION ─────────────────────────────────────────────────────────────
var PRONUNC = { "š":"sch","č":"tsch","ž":"zh","ď":"dj","ť":"tj","ň":"nj","ľ":"lj","á":"aa","é":"ee","í":"ii","ú":"uu","ý":"ii","ô":"uo" };
function getPronTips(word) {
  var tips = [];
  var low = word.toLowerCase();
  Object.keys(PRONUNC).forEach(function(ch) {
    if (low.indexOf(ch) !== -1) tips.push(ch + "=" + PRONUNC[ch]);
  });
  return tips.slice(0,3);
}

  { title: "Persönliche Fürwörter", description: "Die Grundpronomen im Slowakischen", table: [["Ich", "ja"], ["Du", "ty"], ["Er/Sie/Es", "on/ona/ono"], ["Wir", "my"], ["Ihr", "vy"], ["Sie (formal)", "Vy"], ["Sie", "oni/ony"]], tip: "Das formelle 'Vy' wird großgeschrieben, ähnlich wie das deutsche 'Sie'." },
  { title: "Verb 'byť' (sein)", description: "Das wichtigste Verb — sein", table: [["Ich bin", "ja som"], ["Du bist", "ty si"], ["Er/Sie ist", "on/ona je"], ["Wir sind", "my sme"], ["Ihr seid", "vy ste"], ["Sie sind", "oni sú"]], tip: "Merke: 'som' klingt ähnlich wie 'some' — ich BIN etwas." },
  { title: "Verb 'mať' (haben)", description: "Ich habe — auf Slowakisch", table: [["Ich habe", "ja mám"], ["Du hast", "ty máš"], ["Er/Sie hat", "on/ona má"], ["Wir haben", "my máme"], ["Ihr habt", "vy máte"], ["Sie haben", "oni majú"]], tip: "Gut merken: 'mám' = ich habe. Sehr häufig im Alltag!" },
  { title: "Verb 'ísť' (gehen)", description: "Ich gehe — Bewegungsverb", table: [["Ich gehe", "ja idem"], ["Du gehst", "ty ideš"], ["Er/Sie geht", "on/ona ide"], ["Wir gehen", "my ideme"], ["Ihr geht", "vy idete"], ["Sie gehen", "oni idú"]], tip: "'Idem domov' = Ich gehe nach Hause. Sehr alltäglich!" },
  { title: "Zahlen 1–20", description: "Slowakische Zahlen", table: [["1", "jeden"], ["2", "dva"], ["3", "tri"], ["4", "štyri"], ["5", "päť"], ["6", "šesť"], ["7", "sedem"], ["8", "osem"], ["9", "deväť"], ["10", "desať"], ["11", "jedenásť"], ["15", "pätnásť"], ["20", "dvadsať"]], tip: "Ab 11 endet die Zahl auf '-násť' (entspricht dem deutschen '-zehn')." },
  { title: "Verneinung", description: "Wie man Nein sagt", table: [["Ja habe", "Mám"], ["Ich habe nicht", "Nemám"], ["Ich gehe", "Idem"], ["Ich gehe nicht", "Nejdem"], ["Ich bin", "Som"], ["Ich bin nicht", "Nie som"]], tip: "Die Verneinung bildet man mit 'ne-' vor dem Verb. Einfach!" },
];

var CATEGORIES = ["Alle"].concat(
  VOCAB.reduce(function(acc, v) {
    if (acc.indexOf(v.cat) === -1) acc.push(v.cat);
    return acc;
  }, [])
);

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  var vs = window.speechSynthesis.getVoices();
  var v = vs.filter(function(v){ return v.lang.indexOf("sk")===0; })[0]
       || vs.filter(function(v){ return v.lang.indexOf("cs")===0; })[0];
  if (v) u.voice = v;
  u.lang = "sk-SK";
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}

// ── ATOMS ─────────────────────────────────────────────────────────────────────
function Pill(props) {
  return (
    <button
      onClick={props.onClick}
      style={{
        padding:"7px 15px", borderRadius:999, border:"none",
        fontFamily:"inherit", whiteSpace:"nowrap", cursor:"pointer",
        fontSize:13, fontWeight:props.active?600:400, transition:"all 0.18s",
        background:props.active?GOLD:"transparent",
        color:props.active?"#fff":GRAY,
      }}
    >{props.label}</button>
  );
}

function BtnPrimary(props) {
  return (
    <button
      onClick={props.onClick}
      disabled={props.disabled}
      style={{
        width:"100%", padding:"15px 24px", borderRadius:999, border:"none",
        fontFamily:"inherit", fontSize:16, fontWeight:600, cursor:props.disabled?"default":"pointer",
        transition:"all 0.18s",
        background:props.disabled?"#E5E5E5":GOLD,
        color:props.disabled?"#AAA":"#fff",
        boxShadow:props.disabled?"none":SHADOW_G,
      }}
    >{props.children}</button>
  );
}

function SpeakBtn(props) {
  var result = useState(false);
  var lit = result[0];
  var setLit = result[1];
  function tap() {
    speak(props.text);
    setLit(true);
    setTimeout(function(){ setLit(false); }, 600);
  }
  return (
    <button onClick={tap} style={{
      width:38, height:38, borderRadius:999, cursor:"pointer", flexShrink:0,
      border:"1.5px solid " + (lit ? GOLD : BORDER),
      background: lit ? GOLDSOFT : WHITE,
      display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s",
    }}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={lit?GOLD:GRAY} strokeWidth="2" strokeLinecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
  );
}

function Ring(props) {
  var size   = props.size   || 72;
  var stroke = props.stroke || 5;
  var color  = props.color  || GOLD;
  var pct    = Math.min(props.pct || 0, 100);
  var r      = (size - stroke) / 2;
  var circ   = 2 * Math.PI * r;
  var offset = circ * (1 - pct / 100);
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={BORDER} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.6s"}}/>
    </svg>
  );
}

function Card(props) {
  return (
    <div style={Object.assign({ background:WHITE, borderRadius:20, boxShadow:SHADOW, padding:20 }, props.style||{})}>
      {props.children}
    </div>
  );
}

function SectionLabel(props) {
  return (
    <div style={{fontSize:11, fontWeight:600, letterSpacing:0.8, color:LIGHT, textTransform:"uppercase", marginBottom:8}}>
      {props.children}
    </div>
  );
}

// ── LEARN SCREEN ──────────────────────────────────────────────────────────────
function LearnScreen(props) {
  var prog  = loadProgress();
  var known = new Set(prog.known || []);
  var plan  = loadPlan();
  var stats = loadStats();
  var tod   = stats[todayKey()] || { seen:0, correct:0 };
  var pct   = Math.min(100, Math.round(tod.seen / plan.dailyGoal * 100));
  var done  = tod.seen >= plan.dailyGoal;
  var hour  = new Date().getHours();
  var greeting = hour < 12 ? "Dobré ráno 👋" : hour < 18 ? "Dobrý deň 👋" : "Dobrý večer 👋";

  var streak = 0;
  var d2 = new Date();
  while (true) {
    var k = d2.toISOString().slice(0,10);
    var s = stats[k];
    if (s && s.seen >= plan.dailyGoal) { streak++; d2.setDate(d2.getDate()-1); } else break;
  }

  var cats = CATEGORIES.filter(function(c){ return c !== "Alle"; }).slice(0,6);

  return (
    <div style={{padding:"32px 20px 24px"}}>
      {/* Greeting */}
      <div className="fu" style={{marginBottom:24}}>
        <div style={{fontSize:28, fontWeight:300, fontFamily:"'DM Serif Display',serif", color:BLACK, marginBottom:4}}>{greeting}</div>
        <div style={{fontSize:15, color:GRAY}}>Bereit für deine nächste Lerneinheit?</div>
      </div>

      {/* Today card */}
      <Card style={{display:"flex", alignItems:"center", gap:20, marginBottom:20}}>
        <div style={{position:"relative", flexShrink:0}}>
          <Ring pct={pct} size={76} stroke={5}/>
          <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column"}}>
            <div style={{fontSize:20, fontWeight:600, color:done?GREEN:BLACK, lineHeight:1}}>{tod.seen}</div>
            <div style={{fontSize:10, color:LIGHT}}>/{plan.dailyGoal}</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13, color:GRAY, marginBottom:2}}>Tagesziel</div>
          <div style={{fontSize:15, fontWeight:500, color:BLACK}}>{done ? "Ziel erreicht! 🎉" : "Noch " + (plan.dailyGoal - tod.seen) + " Wörter"}</div>
          {streak > 0 && <div style={{fontSize:12, color:GOLD, marginTop:4}}>🔥 {streak} {streak===1?"Tag":"Tage"} Serie</div>}
        </div>
      </Card>

      {/* CTA */}
      <div style={{marginBottom:24}}>
        <BtnPrimary onClick={function(){ props.onGo("flash"); }}>Weiterlernen</BtnPrimary>
      </div>

      {/* Themen */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
        <SectionLabel>Themen</SectionLabel>
        <span style={{fontSize:13, color:GOLD, cursor:"pointer"}} onClick={function(){ props.onGo("know"); }}>Alle anzeigen</span>
      </div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
        {cats.map(function(cat) {
          var tot = VOCAB.filter(function(v){ return v.cat===cat; }).length;
          var kk  = VOCAB.filter(function(v){ return v.cat===cat && known.has(v.sk); }).length;
          var p   = Math.round(kk/tot*100);
          return (
            <div key={cat} onClick={function(){ props.onGo("flash"); }}
              style={{background:WHITE, borderRadius:14, padding:"12px 10px", boxShadow:SHADOW_SM, cursor:"pointer"}}>
              <div style={{fontSize:11, fontWeight:500, color:BLACK, lineHeight:1.3, marginBottom:4}}>{cat.split(" ")[0]}</div>
              <div style={{fontSize:11, color:LIGHT, marginBottom:6}}>{kk}/{tot}</div>
              <div style={{height:2, background:BORDER, borderRadius:1}}>
                <div style={{height:"100%", width:p+"%", background:GOLD, borderRadius:1}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FLASH SCREEN ──────────────────────────────────────────────────────────────
function FlashScreen() {
  var s1 = useState("Alle");  var cat = s1[0]; var setCat = s1[1];
  var s2 = useState("sk2de"); var dir = s2[0]; var setDir = s2[1];
  var s3 = useState(false);   var flipped = s3[0]; var setFlipped = s3[1];
  var s4 = useState(0);       var fkey = s4[0]; var setFkey = s4[1];
  var s5 = useState(function(){ var p=loadProgress(); return new Set(p.known||[]); });
  var known = s5[0]; var setKnown = s5[1];
  var s6 = useState(function(){ var p=loadProgress(); return new Set(p.learning||[]); });
  var learning = s6[0]; var setLearning = s6[1];
  var s7 = useState(0); var idx = s7[0]; var setIdx = s7[1];
  var s8 = useState(false); var ankiMode = s8[0]; var setAnkiMode = s8[1];
  var s9 = useState(function(){ return VOCAB.map(function(_,i){return i;}).sort(function(){return Math.random()-0.5;}); });
  var srQ = s9[0]; var setSrQ = s9[1];
  var s10 = useState(0); var srPos = s10[0]; var setSrPos = s10[1];

  var pool = cat==="Alle" ? VOCAB : VOCAB.filter(function(v){ return v.cat===cat; });
  var card = ankiMode ? VOCAB[srQ[srPos % srQ.length]] : pool[idx % pool.length];
  var cur  = ankiMode ? srPos % srQ.length : idx % pool.length;
  var tot  = ankiMode ? srQ.length : pool.length;
  var front = dir==="sk2de" ? card.sk : card.de;
  var back  = dir==="sk2de" ? card.de : card.sk;
  var tips  = getPronTips(card.sk);
  var gPct  = Math.round(known.size / VOCAB.length * 100);
  var barW  = Math.round((cur+1)/tot*100) + "%";

  function flip() { setFkey(function(k){return k+1;}); setFlipped(function(f){return !f;}); }

  function nextCard(mark) {
    var newKnown    = mark==="known"    ? new Set([].concat(Array.from(known),    [card.sk])) : known;
    var newLearning = mark==="learning" ? new Set([].concat(Array.from(learning), [card.sk])) : learning;
    if (mark==="known")    setKnown(newKnown);
    if (mark==="learning") setLearning(newLearning);
    saveProgress(newKnown, newLearning);
    recordActivity(mark==="known");
    setFlipped(false);
    setFkey(function(k){return k+1;});
    if (ankiMode) {
      var ci = srQ[srPos % srQ.length];
      var iv = mark==="known" ? Math.floor(Math.random()*11)+20 : Math.floor(Math.random()*8)+3;
      setSrQ(function(q){
        var nq = q.slice();
        nq.splice(srPos + iv, 0, ci);
        return nq;
      });
      setTimeout(function(){ setSrPos(function(p){return p+1;}); }, 120);
    } else {
      var plen = pool.length;
      setTimeout(function(){ setIdx(function(i){return (i+1)%plen;}); }, 120);
    }
  }

  function startAnki() {
    setSrQ(VOCAB.map(function(_,i){return i;}).sort(function(){return Math.random()-0.5;}));
    setSrPos(0); setAnkiMode(true); setFlipped(false); setFkey(function(k){return k+1;});
  }

  return (
    <div style={{padding:"20px 20px 8px", display:"flex", flexDirection:"column"}}>
      {/* Direction + Anki */}
      <div style={{display:"flex", gap:6, marginBottom:12, alignItems:"center"}}>
        <Pill label="🇸🇰 → 🇩🇪" active={dir==="sk2de"} onClick={function(){ setDir("sk2de"); setFlipped(false); setFkey(function(k){return k+1;}); }}/>
        <Pill label="🇩🇪 → 🇸🇰" active={dir==="de2sk"} onClick={function(){ setDir("de2sk"); setFlipped(false); setFkey(function(k){return k+1;}); }}/>
        <button onClick={startAnki} style={{
          marginLeft:"auto", padding:"7px 14px", borderRadius:999, border:"none",
          fontFamily:"inherit", fontSize:13, fontWeight:500, cursor:"pointer",
          background:ankiMode?GOLDSOFT:"transparent", color:ankiMode?GOLD:GRAY,
        }}>🧠 Anki</button>
      </div>

      {/* Category filter */}
      <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:10, marginBottom:10}}>
        {CATEGORIES.map(function(c) {
          return <Pill key={c} label={c} active={!ankiMode && cat===c} onClick={function(){ setCat(c); setIdx(0); setFlipped(false); setFkey(function(k){return k+1;}); setAnkiMode(false); }}/>;
        })}
      </div>

      {/* Progress bar */}
      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:16}}>
        <div style={{flex:1, height:3, background:BORDER, borderRadius:2}}>
          <div style={{height:"100%", width:barW, background:GOLD, borderRadius:2, transition:"width 0.4s"}}/>
        </div>
        <span style={{fontSize:12, color:LIGHT, flexShrink:0}}>{cur+1}/{tot}</span>
      </div>

      {/* Card */}
      <div key={fkey} className="fi" onClick={flip} style={{
        background:WHITE, borderRadius:28, boxShadow:SHADOW, cursor:"pointer",
        padding:"32px 24px", textAlign:"center", position:"relative",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        minHeight:240, marginBottom:16,
      }}>
        <div style={{position:"absolute", top:14, left:14}}>
          <span style={{fontSize:11, fontWeight:500, color:LIGHT, background:BORDER, padding:"3px 9px", borderRadius:999}}>
            {dir==="sk2de" ? (flipped?"🇩🇪":"🇸🇰") : (flipped?"🇸🇰":"🇩🇪")}
          </span>
        </div>
        <div style={{position:"absolute", top:12, right:12}} onClick={function(e){e.stopPropagation();}}>
          <SpeakBtn text={card.sk}/>
        </div>
        <div style={{fontSize:11, fontWeight:500, color:GOLD, background:GOLDSOFT, padding:"3px 10px", borderRadius:999, marginBottom:16}}>{card.cat}</div>
        <div style={{
          fontSize: front.length > 14 ? 28 : 42,
          fontWeight:300, fontFamily:"'DM Serif Display',serif",
          color: flipped ? GRAY : BLACK, lineHeight:1.25, marginBottom:8,
        }}>{flipped ? back : front}</div>
        {!flipped && <div style={{fontSize:13, color:LIGHT}}>Tippe zum Umdrehen</div>}
        {flipped && <div style={{fontSize:14, color:GRAY, fontStyle:"italic", marginTop:4, maxWidth:260}}>„{card.ex}"</div>}
        {flipped && tips.length > 0 && (
          <div style={{display:"flex", gap:6, flexWrap:"wrap", justifyContent:"center", marginTop:8}}>
            {tips.map(function(t){ return <span key={t} style={{fontSize:11, color:GOLD, background:GOLDSOFT, padding:"2px 8px", borderRadius:999}}>{t}</span>; })}
          </div>
        )}
      </div>

      {/* Action buttons */}
      {flipped ? (
        <div style={{display:"flex", gap:10, marginBottom:12}}>
          <button onClick={function(){ nextCard("learning"); }} style={{
            flex:1, padding:"14px", borderRadius:999, fontFamily:"inherit",
            border:"1.5px solid rgba(255,59,48,0.2)", background:"rgba(255,59,48,0.05)",
            color:RED, fontSize:15, fontWeight:500, cursor:"pointer",
          }}>✕ Schwer</button>
          <button onClick={function(){ nextCard("known"); }} style={{
            flex:2, padding:"14px", borderRadius:999, fontFamily:"inherit",
            border:"none", background:GOLD, color:"#fff",
            fontSize:15, fontWeight:600, cursor:"pointer", boxShadow:SHADOW_G,
          }}>Einfach ✓</button>
        </div>
      ) : (
        <div style={{marginBottom:12}}>
          <BtnPrimary onClick={flip}>Lösung anzeigen</BtnPrimary>
        </div>
      )}

      {/* Micro stats */}
      <div style={{display:"flex", justifyContent:"center", gap:32, paddingBottom:4}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16, fontWeight:600, color:GREEN}}>{known.size}</div>
          <div style={{fontSize:11, color:LIGHT}}>Gelernt</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16, fontWeight:600, color:GOLD}}>{gPct}%</div>
          <div style={{fontSize:11, color:LIGHT}}>Gesamt</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16, fontWeight:600, color:RED}}>{learning.size}</div>
          <div style={{fontSize:11, color:LIGHT}}>Üben</div>
        </div>
      </div>
    </div>
  );
}

// ── QUIZ SCREEN ───────────────────────────────────────────────────────────────
function QuizScreen() {
  var s1 = useState("Alle");  var cat = s1[0]; var setCat = s1[1];
  var s2 = useState("sk2de"); var dir = s2[0]; var setDir = s2[1];
  var s3 = useState(null);    var q = s3[0]; var setQ = s3[1];
  var s4 = useState(null);    var chosen = s4[0]; var setChosen = s4[1];
  var s5 = useState({r:0,w:0}); var score = s5[0]; var setScore = s5[1];
  var s6 = useState(0);       var qkey = s6[0]; var setQkey = s6[1];

  var pool = cat==="Alle" ? VOCAB : VOCAB.filter(function(v){ return v.cat===cat; });

  function gen() {
    if (pool.length < 4) return;
    var c = pool[Math.floor(Math.random() * pool.length)];
    var ws, opts;
    if (dir==="sk2de") {
      ws   = pool.filter(function(v){return v.sk!==c.sk;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.de;});
      opts = ws.concat([c.de]).sort(function(){return Math.random()-0.5;});
      setQ({ question:c.sk, answer:c.de, options:opts, card:c });
    } else {
      ws   = pool.filter(function(v){return v.sk!==c.sk;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(v){return v.sk;});
      opts = ws.concat([c.sk]).sort(function(){return Math.random()-0.5;});
      setQ({ question:c.de, answer:c.sk, options:opts, card:c });
    }
    setChosen(null);
    setQkey(function(k){return k+1;});
  }

  useEffect(function(){ gen(); }, [cat, dir]);

  function pick(opt) {
    if (chosen !== null) return;
    setChosen(opt);
    var ok = opt === q.answer;
    if (ok) setScore(function(s){return {r:s.r+1,w:s.w};});
    else    setScore(function(s){return {r:s.r,w:s.w+1};});
    recordActivity(ok);
  }

  var tot = score.r + score.w;
  var pct = tot ? Math.round(score.r/tot*100) : 0;

  return (
    <div style={{padding:"20px 20px 24px"}}>
      {/* Direction */}
      <div style={{display:"flex", gap:6, marginBottom:12}}>
        <Pill label="🇸🇰 → 🇩🇪" active={dir==="sk2de"} onClick={function(){ setDir("sk2de"); setScore({r:0,w:0}); }}/>
        <Pill label="🇩🇪 → 🇸🇰" active={dir==="de2sk"} onClick={function(){ setDir("de2sk"); setScore({r:0,w:0}); }}/>
      </div>

      {/* Category */}
      <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:16}}>
        {CATEGORIES.map(function(c) {
          return <Pill key={c} label={c} active={cat===c} onClick={function(){ setCat(c); setScore({r:0,w:0}); }}/>;
        })}
      </div>

      {/* Score */}
      <div style={{display:"flex", gap:10, marginBottom:16}}>
        {[{v:score.r,l:"Richtig",col:GREEN},{v:pct+"%",l:"Quote",col:GOLD},{v:score.w,l:"Falsch",col:RED}].map(function(item){
          return (
            <div key={item.l} style={{flex:1, background:WHITE, borderRadius:14, padding:"12px 8px", textAlign:"center", boxShadow:SHADOW_SM}}>
              <div style={{fontSize:20, fontWeight:600, color:item.col}}>{item.v}</div>
              <div style={{fontSize:11, color:LIGHT}}>{item.l}</div>
            </div>
          );
        })}
      </div>

      {q && (
        <div key={qkey}>
          {/* Question */}
          <Card style={{textAlign:"center", padding:"28px 20px", marginBottom:16}}>
            <div style={{fontSize:12, color:LIGHT, marginBottom:12}}>
              {dir==="sk2de" ? "Was bedeutet auf Deutsch…" : "Wie heißt auf Slowakisch…"}
            </div>
            <div style={{fontSize:36, fontWeight:300, fontFamily:"'DM Serif Display',serif", color:BLACK, lineHeight:1.2, marginBottom:8}}>{q.question}</div>
            <span style={{fontSize:11, color:GOLD, background:GOLDSOFT, padding:"3px 10px", borderRadius:999}}>{q.card.cat}</span>
          </Card>

          {/* Options */}
          <div style={{display:"flex", flexDirection:"column", gap:10, marginBottom:16}}>
            {q.options.map(function(opt) {
              var isC = opt === q.answer;
              var isP = chosen === opt;
              var bg  = chosen ? (isC ? "rgba(52,199,89,0.08)"  : isP ? "rgba(255,59,48,0.07)" : WHITE) : WHITE;
              var bdr = chosen ? (isC ? GREEN : isP ? RED : BORDER) : BORDER;
              var col = chosen ? (isC ? GREEN : isP ? RED : BLACK) : BLACK;
              return (
                <button key={opt} onClick={function(){ pick(opt); }} style={{
                  padding:"16px 20px", borderRadius:14, fontFamily:"inherit",
                  background:bg, border:"1.5px solid "+bdr, color:col,
                  fontSize:15, fontWeight:chosen&&isC?600:400,
                  cursor:chosen?"default":"pointer", textAlign:"left",
                  boxShadow:SHADOW_SM, transition:"all 0.18s",
                }}>
                  {chosen && isC ? "✓ " : ""}{chosen && isP && !isC ? "✕ " : ""}{opt}
                </button>
              );
            })}
            {!chosen && (
              <button onClick={function(){ pick(""); }} style={{fontSize:13, color:LIGHT, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", textAlign:"center", padding:8}}>Ich weiß es nicht</button>
            )}
          </div>

          {chosen && (
            <div className="fu">
              <div style={{
                background: chosen===q.answer ? "rgba(52,199,89,0.08)" : "rgba(255,59,48,0.07)",
                border: "1px solid " + (chosen===q.answer ? "rgba(52,199,89,0.25)" : "rgba(255,59,48,0.2)"),
                borderRadius:14, padding:"14px 20px", textAlign:"center", marginBottom:12,
              }}>
                <div style={{fontSize:15, fontWeight:600, color:chosen===q.answer?GREEN:RED}}>
                  {chosen===q.answer ? "Richtig! 🎉" : "Leider falsch."}
                </div>
                <div style={{fontSize:13, color:GRAY, marginTop:4}}>{q.card.sk} = {q.card.de}</div>
              </div>
              <BtnPrimary onClick={gen}>Weiter</BtnPrimary>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── KNOWLEDGE SCREEN ──────────────────────────────────────────────────────────
function KnowledgeScreen() {
  var s1 = useState("Grammatik"); var sec = s1[0]; var setSec = s1[1];
  var s2 = useState(0);           var open = s2[0]; var setOpen = s2[1];
  var s3 = useState("Alle");      var pf = s3[0]; var setPf = s3[1];
  var s4 = useState([{role:"assistant",content:"Ahoj! Ich bin dein KI-Tutor 🇸🇰 Womit kann ich helfen?"}]);
  var msgs = s4[0]; var setMsgs = s4[1];
  var s5 = useState(""); var inp = s5[0]; var setInp = s5[1];
  var s6 = useState(false); var load = s6[0]; var setLoad = s6[1];
  var chatRef = useRef(null);

  var secs = ["Grammatik","Phrasen","KI-Tutor"];
  var pfCtxRaw = PHRASES.reduce(function(acc,p){ if(acc.indexOf(p.context)===-1) acc.push(p.context); return acc; }, []);
  var pfCtx = ["Alle"].concat(pfCtxRaw);
  var fp = pf==="Alle" ? PHRASES : PHRASES.filter(function(p){ return p.context===pf; });

  useEffect(function(){
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [msgs]);

  function sendMsg() {
    if (!inp.trim() || load) return;
    var m = {role:"user", content:inp};
    var h = msgs.concat([m]);
    setMsgs(h); setInp(""); setLoad(true);
    fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:700,
        system:"Du bist ein freundlicher Slowakisch-Lehrer für Deutschsprachige. Antworte kurz auf Deutsch. Hebe slowakische Wörter mit **Fettschrift** hervor.",
        messages:h.map(function(m){ return {role:m.role,content:m.content}; })
      })
    }).then(function(r){ return r.json(); }).then(function(d){
      var reply = (d.content||[]).map(function(b){ return b.text||""; }).join("") || "Fehler.";
      setMsgs(function(hh){ return hh.concat([{role:"assistant",content:reply}]); });
      setLoad(false);
    }).catch(function(){
      setMsgs(function(hh){ return hh.concat([{role:"assistant",content:"Verbindungsfehler."}]); });
      setLoad(false);
    });
  }

  return (
    <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
      {/* Section tabs */}
      <div style={{padding:"16px 20px 0", display:"flex", borderBottom:"1px solid "+BORDER}}>
        {secs.map(function(s){
          return (
            <button key={s} onClick={function(){ setSec(s); }} style={{
              padding:"10px 16px", background:"none", fontFamily:"inherit",
              borderBottom:"2px solid "+(sec===s?GOLD:"transparent"),
              color:sec===s?GOLD:GRAY, fontSize:14, fontWeight:sec===s?600:400,
              cursor:"pointer", transition:"all 0.18s", border:"none",
              borderBottomWidth:2, borderBottomStyle:"solid", borderBottomColor:sec===s?GOLD:"transparent",
            }}>{s}</button>
          );
        })}
      </div>

      <div style={{flex:1, overflowY:"auto", padding:"16px 20px 32px"}}>
        {sec==="Grammatik" && (
          <div>
            {GRAMMAR.map(function(g,i){
              return (
                <div key={i} style={{background:WHITE, borderRadius:16, overflow:"hidden", boxShadow:SHADOW_SM, marginBottom:10}}>
                  <div onClick={function(){ setOpen(open===i?-1:i); }} style={{padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer"}}>
                    <div>
                      <div style={{fontSize:15, fontWeight:500, color:BLACK}}>{g.title}</div>
                      <div style={{fontSize:12, color:GRAY, marginTop:2}}>{g.description}</div>
                    </div>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={LIGHT} strokeWidth="2" strokeLinecap="round"
                      style={{transform:open===i?"rotate(180deg)":"none", transition:"0.2s", flexShrink:0}}>
                      <path d="M6 9l6 6 6-6"/>
                    </svg>
                  </div>
                  {open===i && (
                    <div style={{padding:"0 20px 20px", borderTop:"1px solid "+BORDER}}>
                      <table style={{width:"100%", borderCollapse:"collapse", marginTop:12}}>
                        <tbody>
                          {g.table.map(function(row,j){
                            return (
                              <tr key={j} style={{borderBottom:"1px solid "+BORDER}}>
                                <td style={{padding:"8px 0", fontSize:13, color:GRAY}}>{row[0]}</td>
                                <td style={{padding:"8px 0", fontSize:16, fontWeight:500, color:BLACK, textAlign:"right"}}>{row[1]}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                      <div style={{marginTop:12, padding:"10px 14px", background:GOLDSOFT, borderRadius:10, borderLeft:"3px solid "+GOLD}}>
                        <div style={{fontSize:12, color:GOLD}}>💡 {g.tip}</div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {sec==="Phrasen" && (
          <div>
            <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:10, marginBottom:10}}>
              {pfCtx.map(function(c){ return <Pill key={c} label={c} active={pf===c} onClick={function(){ setPf(c); }}/>; })}
            </div>
            {fp.map(function(p,i){
              return (
                <div key={i} style={{background:WHITE, borderRadius:14, padding:"14px 16px", boxShadow:SHADOW_SM, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
                  <div>
                    <div style={{fontSize:16, color:BLACK}}>{p.sk}</div>
                    <div style={{fontSize:13, color:GRAY, marginTop:2}}>{p.de}</div>
                  </div>
                  <SpeakBtn text={p.sk}/>
                </div>
              );
            })}
          </div>
        )}

        {sec==="KI-Tutor" && (
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            <div ref={chatRef} style={{display:"flex", flexDirection:"column", gap:10, maxHeight:360, overflowY:"auto"}}>
              {msgs.map(function(m,i){
                return (
                  <div key={i} style={{
                    alignSelf:m.role==="user"?"flex-end":"flex-start",
                    maxWidth:"80%", padding:"10px 14px", fontSize:14, lineHeight:1.5,
                    borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                    background:m.role==="user"?GOLD:WHITE,
                    color:m.role==="user"?"#fff":BLACK,
                    boxShadow:SHADOW_SM,
                  }}>
                    {m.content.split("**").map(function(p,j){
                      return j%2===1 ? <strong key={j} style={{color:m.role==="user"?"#fff":GOLD}}>{p}</strong> : p;
                    })}
                  </div>
                );
              })}
              {load && <div style={{alignSelf:"flex-start", padding:"10px 14px", background:WHITE, borderRadius:"18px 18px 18px 4px", color:LIGHT, fontSize:13, boxShadow:SHADOW_SM}}>✍️ …</div>}
            </div>
            <div style={{display:"flex", gap:8}}>
              <input value={inp} onChange={function(e){setInp(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")sendMsg();}}
                placeholder="Nachricht…"
                style={{flex:1, padding:"12px 16px", borderRadius:999, border:"1.5px solid "+BORDER, fontSize:14, outline:"none", fontFamily:"inherit", background:WHITE, color:BLACK}}/>
              <button onClick={sendMsg} disabled={load} style={{width:44,height:44,borderRadius:999,background:GOLD,border:"none",cursor:"pointer",color:"#fff",fontSize:20,flexShrink:0}}>›</button>
            </div>
            <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
              {["Wie sage ich 'Ich bin müde'?","Erkläre die Verneinung","Übe mit mir"].map(function(s){
                return <button key={s} onClick={function(){setInp(s);}} style={{fontSize:12,color:GOLD,background:GOLDSOFT,border:"none",borderRadius:999,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit"}}>{s}</button>;
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── PROGRESS SCREEN ───────────────────────────────────────────────────────────
function ProgressScreen() {
  var stats  = loadStats();
  var prog   = loadProgress();
  var known  = new Set(prog.known || []);
  var plan   = loadPlan();
  var tod    = stats[todayKey()] || {seen:0,correct:0};
  var s1 = useState(plan.dailyGoal); var goal = s1[0]; var setGoal = s1[1];
  var s2 = useState(false); var saved = s2[0]; var setSaved = s2[1];

  var totalSeen = Object.values(stats).reduce(function(s,d){return s+d.seen;},0);
  var totalOk   = Object.values(stats).reduce(function(s,d){return s+d.correct;},0);
  var acc  = totalSeen ? Math.round(totalOk/totalSeen*100) : 0;
  var kPct = Math.round(known.size/VOCAB.length*100);

  var streak=0; var d2=new Date();
  while(true){
    var k=d2.toISOString().slice(0,10);
    var ss=stats[k];
    if(ss&&ss.seen>=plan.dailyGoal){streak++;d2.setDate(d2.getDate()-1);}else break;
  }

  var days = [];
  for (var i=0; i<14; i++) {
    var dd = new Date(); dd.setDate(dd.getDate()-(13-i));
    var dkey = dd.toISOString().slice(0,10);
    var lbl  = i===13?"Heute":dd.toLocaleDateString("de",{weekday:"short"}).slice(0,2);
    days.push({key:dkey, lbl:lbl, data:stats[dkey]||{seen:0,correct:0}});
  }
  var maxS = Math.max.apply(null, days.map(function(d){return d.data.seen;}).concat([plan.dailyGoal,1]));

  var catS = {};
  VOCAB.forEach(function(v){
    if(!catS[v.cat]) catS[v.cat]={t:0,k:0};
    catS[v.cat].t++;
    if(known.has(v.sk)) catS[v.cat].k++;
  });

  function saveG() {
    savePlan(Object.assign({},plan,{dailyGoal:goal}));
    setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  return (
    <div style={{padding:"24px 20px 48px"}}>
      <div style={{fontSize:26, fontWeight:300, fontFamily:"'DM Serif Display',serif", color:BLACK, marginBottom:24}}>Fortschritt</div>

      {/* Ring summary */}
      <Card style={{display:"flex", alignItems:"center", gap:20, marginBottom:16}}>
        <div style={{position:"relative", flexShrink:0}}>
          <Ring pct={kPct} size={88} stroke={7}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
            <div style={{fontSize:20,fontWeight:600,color:BLACK}}>{kPct}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:22,fontWeight:600,color:BLACK}}>{known.size} <span style={{fontSize:14,fontWeight:400,color:LIGHT}}>/ {VOCAB.length}</span></div>
          <div style={{fontSize:13,color:GRAY,marginTop:2}}>Wörter gelernt</div>
          <div style={{display:"flex",gap:20,marginTop:12}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span>🔥</span><span style={{fontSize:18,fontWeight:600,color:BLACK}}>{streak}</span>
              </div>
              <div style={{fontSize:11,color:LIGHT}}>Serie</div>
            </div>
            <div>
              <div style={{fontSize:18,fontWeight:600,color:BLACK}}>{tod.seen}</div>
              <div style={{fontSize:11,color:LIGHT}}>Heute</div>
            </div>
            <div>
              <div style={{fontSize:18,fontWeight:600,color:GREEN}}>{acc}%</div>
              <div style={{fontSize:11,color:LIGHT}}>Genauigkeit</div>
            </div>
          </div>
        </div>
      </Card>

      {/* Heatmap */}
      <Card style={{marginBottom:16}}>
        <SectionLabel>Letzte 30 Tage</SectionLabel>
        <div style={{display:"flex", flexWrap:"wrap", gap:5}}>
          {(function(){
            var dots = [];
            for(var ii=0;ii<30;ii++){
              var dd2=new Date(); dd2.setDate(dd2.getDate()-(29-ii));
              var hkey=dd2.toISOString().slice(0,10);
              var hs=stats[hkey];
              var iv2=hs?Math.min(1,hs.seen/plan.dailyGoal):0;
              var bg2=iv2===0?BORDER:iv2<0.5?GOLDMID:iv2<1?GOLD:GREEN;
              var isT=hkey===todayKey();
              dots.push(<div key={hkey} title={hkey} style={{width:24,height:24,borderRadius:6,background:bg2,border:"2px solid "+(isT?GOLD:"transparent"),transition:"background 0.3s"}}/>);
            }
            return dots;
          })()}
        </div>
      </Card>

      {/* Bar chart */}
      <Card style={{marginBottom:16}}>
        <SectionLabel>Letzte 14 Tage</SectionLabel>
        <div style={{display:"flex", alignItems:"flex-end", gap:4, height:72}}>
          {days.map(function(day){
            var h=Math.round(day.data.seen/maxS*68);
            var goalR=day.data.seen>=plan.dailyGoal;
            var isT=day.key===todayKey();
            return (
              <div key={day.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:68}}>
                  <div style={{width:"100%",height:Math.max(h,2),background:goalR?GREEN:isT?GOLD:BORDER,borderRadius:"3px 3px 0 0",transition:"height 0.4s"}}/>
                </div>
                <div style={{fontSize:9,color:isT?GOLD:LIGHT,fontFamily:"monospace"}}>{day.lbl}</div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Category progress */}
      <Card style={{marginBottom:16}}>
        <SectionLabel>Nach Thema</SectionLabel>
        {Object.keys(catS).map(function(cat){
          var ct=catS[cat]; var p=Math.round(ct.k/ct.t*100);
          return (
            <div key={cat} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:13,color:BLACK}}>{cat}</span>
                <span style={{fontSize:12,color:LIGHT}}>{ct.k}/{ct.t}</span>
              </div>
              <div style={{height:4,background:BORDER,borderRadius:2}}>
                <div style={{height:"100%",width:p+"%",background:p===100?GREEN:GOLD,borderRadius:2,transition:"width 0.4s"}}/>
              </div>
            </div>
          );
        })}
      </Card>

      {/* Goal setting */}
      <Card>
        <SectionLabel>Tagesziel</SectionLabel>
        <div style={{display:"flex", gap:8, marginBottom:16}}>
          {[5,10,15,20,30].map(function(n){
            return (
              <button key={n} onClick={function(){setGoal(n);}} style={{
                flex:1, padding:"10px 4px", borderRadius:12, fontFamily:"inherit",
                background:goal===n?GOLD:"transparent",
                border:"1.5px solid "+(goal===n?GOLD:BORDER),
                color:goal===n?"#fff":GRAY,
                fontSize:14, fontWeight:goal===n?600:400, cursor:"pointer", transition:"all 0.18s",
              }}>{n}</button>
            );
          })}
        </div>
        <BtnPrimary onClick={saveG}>{saved ? "✓ Gespeichert!" : "Ziel speichern"}</BtnPrimary>
      </Card>
    </div>
  );
}

// ── TAB BAR ───────────────────────────────────────────────────────────────────
function TabBar(props) {
  var tab    = props.tab;
  var setTab = props.setTab;

  function TabBtn(tbProps) {
    var active = tab === tbProps.id;
    return (
      <button onClick={function(){ setTab(tbProps.id); }} style={{
        flex:1, padding:"10px 0 12px", background:"none", border:"none",
        cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, fontFamily:"inherit",
      }}>
        {tbProps.icon(active ? GOLD : LIGHT)}
        <span style={{fontSize:9, fontWeight:active?600:400, color:active?GOLD:LIGHT}}>{tbProps.label}</span>
      </button>
    );
  }

  return (
    <div style={{display:"flex", background:WHITE, borderTop:"1px solid "+BORDER, paddingBottom:"env(safe-area-inset-bottom)", flexShrink:0}}>
      <TabBtn id="learn" label="Lernen" icon={function(col){
        return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
      }}/>
      <TabBtn id="flash" label="Flashcards" icon={function(col){
        return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>;
      }}/>
      <TabBtn id="quiz" label="Quiz" icon={function(col){
        return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" strokeWidth="3"/></svg>;
      }}/>
      <TabBtn id="know" label="Wissen" icon={function(col){
        return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>;
      }}/>
      <TabBtn id="prog" label="Fortschritt" icon={function(col){
        return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
      }}/>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  var s1 = useState("learn"); var tab = s1[0]; var setTab = s1[1];
  return (
    <div style={{display:"flex", flexDirection:"column", height:"100dvh", maxWidth:480, margin:"0 auto", background:BG, overflow:"hidden"}}>
      <div style={{height:"env(safe-area-inset-top)", background:WHITE, flexShrink:0}}/>
      <div style={{flex:1, overflowY:"auto"}}>
        {tab==="learn" && <LearnScreen onGo={setTab}/>}
        {tab==="flash" && <FlashScreen/>}
        {tab==="quiz"  && <QuizScreen/>}
        {tab==="know"  && <KnowledgeScreen/>}
        {tab==="prog"  && <ProgressScreen/>}
      </div>
      <TabBar tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
