  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #F0EDE8;
      --ink:    #1C1917;
      --muted:  #6B6560;
      --faint:  #AAA49D;
      --accent: #8B5E3C;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.9s ease, color 0.9s ease;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; font-weight: 300; }

    /* ── SVG background — full bleed, behind everything ── */
    #bg-svg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.9s ease;
    }

    /* ── Shell ── */
    #shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 36px 52px 36px;
      max-width: 820px;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }
    #logo {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.24em;
      color: var(--muted);
      text-transform: uppercase;
    }
    #timer {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--faint);
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 0 16px;
    }
    #prompt-wrap {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    #prompt-wrap.out { opacity: 0; transform: translateY(14px); }

    #prompt {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 5.8vw, 70px);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 36px;
    }
    .rule {
      width: 30px; height: 1.5px;
      background: var(--muted);
      opacity: 0.4;
      margin-bottom: 26px;
    }
    #reflection {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(15px, 1.9vw, 20px);
      font-weight: 400;
      line-height: 1.55;
      color: var(--muted);
      max-width: 400px;
      margin-bottom: 52px;
    }
    #quote-block { max-width: 420px; }
    #quote-mark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0.8;
    }
    #quote-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(14px, 1.75vw, 18px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 14px;
    }
    #quote-author {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--faint);
      text-transform: uppercase;
    }
    #quote-author::before { content: "— "; }

    /* ── Footer ── */
    #footer {
      flex-shrink: 0;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    #date-label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--faint);
      opacity: 0.6;
    }
    #dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--ink);
      opacity: 0.15;
    }

    @media (max-width: 600px) {
      #shell   { padding: 28px 30px 28px; }
      #content { padding: 44px 0 12px; }
      #prompt  { margin-bottom: 28px; }
      #reflection { margin-bottom: 40px; }
    }
    @media (max-width: 380px) {
      #shell { padding: 24px 22px 22px; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════════════════
// SEED SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

function getViennaDateString() {
  const now = new Date();
  const s = now.toLocaleString('en-CA', {
    timeZone:'Europe/Vienna', hour12:false,
    year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
  });
  const [dp, tp] = s.split(', ');
  const [year, month, day] = dp.split('-').map(Number);
  const [hour] = tp.split(':').map(Number);
  if (hour < 6) {
    const d = new Date(Date.UTC(year, month-1, day-1));
    return d.toISOString().slice(0,10);
  }
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function makeRng(seed) {
  let h = 5381;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) + h) + seed.charCodeAt(i); h |= 0; }
  return () => { h = Math.imul(1664525, h) + 1013904223 | 0; return (h >>> 0) / 0xFFFFFFFF; };
}

// Salted pick — each category fully independent
function saltedPick(arr, ds, salt) {
  const rng = makeRng(ds + '|' + salt);
  return arr[Math.floor(rng() * arr.length)];
}

// Multiple salted floats for graphic generation
function saltedFloats(ds, salt, count) {
  const rng = makeRng(ds + '|' + salt);
  return Array.from({length: count}, () => rng());
}

// ═══════════════════════════════════════════════════════════════════════════
// GRAPHIC SYSTEM
// Determines graphic type from subject + lighting, then draws SVG elements.
// All values derived from date seed → same day = same graphic.
// ═══════════════════════════════════════════════════════════════════════════

function getGraphicType(subject, lightingPhrase) {
  const s = subject.toLowerCase();
  const l = lightingPhrase.toLowerCase();
  // Lighting-first overrides
  if (l.includes('nacht') || l.includes('dämmerung') || l.includes('neon') || l.includes('scheinwerfer')) return 'night';
  if (l.includes('halbdunkel') || l.includes('schatten') || l.includes('regen')) return 'shadow';
  if (l.includes('gegenlicht')) return 'silhouette';
  // Subject-based
  if (s.includes('spiegelung'))                                                     return 'mirror';
  if (s.includes('schatten'))                                                        return 'shadow';
  if (s.includes('linie') || s.includes('weg') || s.includes('grenze') || s.includes('rand')) return 'perspective';
  if (s.includes('muster') || s.includes('struktur') || s.includes('textur'))       return 'grid';
  if (s.includes('lichtquelle'))                                                     return 'light';
  if (s.includes('silhouette'))                                                      return 'silhouette';
  if (s.includes('fenster') || s.includes('tür') || s.includes('zwischenraum'))     return 'frame';
  if (s.includes('bewegung') || s.includes('geste') || s.includes('begegnung'))     return 'scatter';
  if (s.includes('stille') || s.includes('leere') || s.includes('warten'))          return 'minimal';
  if (l.includes('morgen') || l.includes('abend') || l.includes('kerzen'))          return 'warm_lines';
  if (l.includes('diffus') || l.includes('weich') || l.includes('bewölkt'))         return 'soft_grid';
  return 'minimal';
}

// SVG namespace helper
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  return e;
}

// W=390 H=844 — matches viewBox
const W = 390, H = 844;

function buildGraphic(type, seed, inkColor) {
  const frag = document.createDocumentFragment();
  const R = saltedFloats(seed, 'gfx', 60); // 60 random values for graphic use
  let ri = 0; // index into R
  const r = () => R[ri++ % R.length];

  const s = (opacity) => String(opacity);

  switch (type) {

    case 'shadow': {
      // Dense horizontal bands fading upward, a single light-source dot + shadow rays
      const lightX = 60 + r() * 270;
      const lightY = 40 + r() * 120;
      // Shadow rays
      [0.06, 0.045, 0.03].forEach((op, i) => {
        const angle = 0.3 + r() * 0.4;
        const len = 600 + r() * 200;
        const x2 = lightX + Math.cos(Math.PI * (0.8 + angle)) * len;
        const y2 = lightY + Math.sin(Math.PI * (0.8 + angle)) * len;
        frag.appendChild(el('line', { x1:lightX, y1:lightY, x2, y2, stroke:inkColor, 'stroke-width':'0.5', opacity:s(op) }));
      });
      // Horizontal lines — dense bottom, fading up
      const bandOpacities = [0.07, 0.06, 0.055, 0.05, 0.04, 0.035, 0.028, 0.022, 0.016, 0.01];
      bandOpacities.forEach((op, i) => {
        const y = H - 20 - i * (55 + r() * 20);
        if (y > 0) frag.appendChild(el('line', { x1:0, y1:y, x2:W, y2:y, stroke:inkColor, 'stroke-width':'0.4', opacity:s(op) }));
      });
      // Light dot
      frag.appendChild(el('circle', { cx:lightX, cy:lightY, r:'1.8', fill:inkColor, opacity:'0.2' }));
      frag.appendChild(el('circle', { cx:lightX, cy:lightY, r:'7',   fill:'none', stroke:inkColor, 'stroke-width':'0.4', opacity:'0.07' }));
      frag.appendChild(el('circle', { cx:lightX, cy:lightY, r:'18',  fill:'none', stroke:inkColor, 'stroke-width':'0.3', opacity:'0.035' }));
      break;
    }

    case 'mirror': {
      // Horizontal mirror axis, vertical lines above+below, ripple horizontals below, sun+reflection
      const axisY = 360 + r() * 120;
      frag.appendChild(el('line', { x1:0, y1:axisY, x2:W, y2:axisY, stroke:inkColor, 'stroke-width':'0.6', opacity:'0.1' }));
      const sunX = 80 + r() * 230;
      const sunY = 50 + r() * 80;
      // Vertical lines above — converge toward axis
      for (let i = 0; i < 8; i++) {
        const x = 40 + i * 44;
        const topY = sunY + r() * (axisY - sunY - 40);
        frag.appendChild(el('line', { x1:x, y1:axisY, x2:x + (r()-0.5)*16, y2:topY, stroke:inkColor, 'stroke-width':'0.4', opacity:'0.05' }));
        // Mirror below
        const botY = axisY + (axisY - topY) * 0.75;
        frag.appendChild(el('line', { x1:x, y1:axisY, x2:x + (r()-0.5)*12, y2:Math.min(botY, H-20), stroke:inkColor, 'stroke-width':'0.3', opacity:'0.03' }));
      }
      // Ripple horizontals below axis
      for (let i = 1; i <= 5; i++) {
        const y = axisY + i * (38 + r()*12);
        if (y < H - 20) frag.appendChild(el('line', { x1:30, y1:y, x2:W-30, y2:y, stroke:inkColor, 'stroke-width':'0.3', opacity:s(0.032 - i*0.005) }));
      }
      // Sun dot
      frag.appendChild(el('circle', { cx:sunX, cy:sunY, r:'2',  fill:inkColor, opacity:'0.18' }));
      frag.appendChild(el('circle', { cx:sunX, cy:sunY, r:'9',  fill:'none', stroke:inkColor, 'stroke-width':'0.4', opacity:'0.06' }));
      frag.appendChild(el('circle', { cx:sunX, cy:sunY, r:'20', fill:'none', stroke:inkColor, 'stroke-width':'0.25', opacity:'0.03' }));
      // Reflection dot
      const refY = axisY + (axisY - sunY) * 0.8;
      if (refY < H - 10) {
        frag.appendChild(el('circle', { cx:sunX, cy:refY, r:'1.5', fill:inkColor, opacity:'0.07' }));
        frag.appendChild(el('circle', { cx:sunX, cy:refY, r:'7',   fill:'none', stroke:inkColor, 'stroke-width':'0.3', opacity:'0.025' }));
      }
      break;
    }

    case 'perspective': {
      // Two lines converging to a vanishing point, cross-lines getting denser
      const vpX = W * (0.35 + r() * 0.3);
      const vpY = H * (0.25 + r() * 0.2);
      frag.appendChild(el('line', { x1:0,   y1:H, x2:vpX, y2:vpY, stroke:inkColor, 'stroke-width':'0.6', opacity:'0.1' }));
      frag.appendChild(el('line', { x1:W,   y1:H, x2:vpX, y2:vpY, stroke:inkColor, 'stroke-width':'0.6', opacity:'0.1' }));
      // Cross-lines
      const steps = [0.95, 0.88, 0.80, 0.71, 0.62, 0.52, 0.42];
      steps.forEach((t, i) => {
        const y = vpY + t * (H - vpY);
        const lx = vpX - t * vpX;
        const rx = vpX + t * (W - vpX);
        const op = 0.065 - i * 0.007;
        frag.appendChild(el('line', { x1:lx, y1:y, x2:rx, y2:y, stroke:inkColor, 'stroke-width':'0.35', opacity:s(Math.max(op,0.01)) }));
      });
      // VP dot
      frag.appendChild(el('circle', { cx:vpX, cy:vpY, r:'1.2', fill:inkColor, opacity:'0.22' }));
      frag.appendChild(el('circle', { cx:vpX, cy:vpY, r:'5',   fill:'none', stroke:inkColor, 'stroke-width':'0.3', opacity:'0.08' }));
      break;
    }

    case 'grid': {
      // Dot grid fading toward center
      const cols = [24,60,96,132,168,204,240,276,312,348];
      const rows = [60,120,180,600,660,720,780,830];
      cols.forEach(cx => rows.forEach(cy => {
        const dx = (cx - W/2) / (W/2);
        const dy = (cy - H/2) / (H/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        const op = Math.max(0.01, 0.22 * dist - 0.02);
        frag.appendChild(el('circle', { cx, cy, r:'0.9', fill:inkColor, opacity:s(op) }));
      }));
      // Frame lines
      frag.appendChild(el('rect', { x:20, y:20, width:W-40, height:H-40, fill:'none', stroke:inkColor, 'stroke-width':'0.5', opacity:'0.06', rx:'2' }));
      frag.appendChild(el('rect', { x:32, y:32, width:W-64, height:H-64, fill:'none', stroke:inkColor, 'stroke-width':'0.3', opacity:'0.03', rx:'1' }));
      break;
    }

    case 'night': {
      // Scattered small dots like stars/lights, denser at edges
      for (let i = 0; i < 40; i++) {
        const x = r() * W;
        const y = r() * H;
        const dx = (x - W/2) / (W/2);
        const dy = (y - H/2) / (H/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        const op = 0.05 + dist * 0.18;
        const rad = 0.6 + r() * 0.8;
        frag.appendChild(el('circle', { cx:x, cy:y, r:String(rad), fill:inkColor, opacity:s(Math.min(op, 0.25)) }));
      }
      // A single brighter point
      const bx = 60 + r() * 270, by = 60 + r() * 200;
      frag.appendChild(el('circle', { cx:bx, cy:by, r:'2',  fill:inkColor, opacity:'0.28' }));
      frag.appendChild(el('circle', { cx:bx, cy:by, r:'8',  fill:'none', stroke:inkColor, 'stroke-width':'0.35', opacity:'0.08' }));
      frag.appendChild(el('circle', { cx:bx, cy:by, r:'20', fill:'none', stroke:inkColor, 'stroke-width':'0.2', opacity:'0.04' }));
      break;
    }

    case 'silhouette': {
      // Strong vertical line off-center, thin horizontal, diagonal accent
      const vx = 80 + r() * 230;
      frag.appendChild(el('line', { x1:vx, y1:0,   x2:vx, y2:H,   stroke:inkColor, 'stroke-width':'0.7', opacity:'0.1' }));
      frag.appendChild(el('line', { x1:vx, y1:0,   x2:vx+6, y2:H, stroke:inkColor, 'stroke-width':'0.3', opacity:'0.04' }));
      const hy = 200 + r() * 400;
      frag.appendChild(el('line', { x1:0,  y1:hy,  x2:W,   y2:hy, stroke:inkColor, 'stroke-width':'0.4', opacity:'0.06' }));
      // Light source behind (gegenlicht)
      const lx = 20 + r() * (W-40), ly = 20 + r() * 120;
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'3',  fill:inkColor, opacity:'0.14' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'14', fill:'none', stroke:inkColor, 'stroke-width':'0.35', opacity:'0.05' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'30', fill:'none', stroke:inkColor, 'stroke-width':'0.2', opacity:'0.025' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'60', fill:'none', stroke:inkColor, 'stroke-width':'0.15', opacity:'0.015' }));
      break;
    }

    case 'frame': {
      // Nested rectangles, slightly offset — window/door frame feel
      const pad = [20, 36, 52, 72];
      const opacities = [0.07, 0.05, 0.035, 0.02];
      pad.forEach((p, i) => {
        const shift = (r() - 0.5) * 6;
        frag.appendChild(el('rect', {
          x: p + shift, y: p,
          width: W - p*2 - Math.abs(shift),
          height: H - p*2,
          fill:'none', stroke:inkColor,
          'stroke-width': String(0.5 - i*0.07),
          opacity: s(opacities[i]),
          rx:'1'
        }));
      });
      // Single vertical center line
      frag.appendChild(el('line', { x1:W/2, y1:0, x2:W/2, y2:H, stroke:inkColor, 'stroke-width':'0.3', opacity:'0.04' }));
      break;
    }

    case 'scatter': {
      // Random short lines — movement, gesture feel
      for (let i = 0; i < 18; i++) {
        const x = r() * W;
        const y = r() * H;
        const len = 12 + r() * 40;
        const angle = r() * Math.PI * 2;
        const x2 = x + Math.cos(angle) * len;
        const y2 = y + Math.sin(angle) * len;
        const op = 0.03 + r() * 0.06;
        frag.appendChild(el('line', { x1:x, y1:y, x2, y2, stroke:inkColor, 'stroke-width':'0.4', opacity:s(op) }));
      }
      // A few dots
      for (let i = 0; i < 6; i++) {
        frag.appendChild(el('circle', { cx:r()*W, cy:r()*H, r:String(0.7 + r()*0.8), fill:inkColor, opacity:s(0.08 + r()*0.08) }));
      }
      break;
    }

    case 'light': {
      // Radiating lines from a point, like a bare bulb
      const lx = 80 + r() * 230, ly = 60 + r() * 160;
      const rayCount = 12;
      for (let i = 0; i < rayCount; i++) {
        const angle = (i / rayCount) * Math.PI * 2;
        const len = 120 + r() * 300;
        frag.appendChild(el('line', {
          x1:lx, y1:ly,
          x2: lx + Math.cos(angle) * len,
          y2: ly + Math.sin(angle) * len,
          stroke:inkColor, 'stroke-width':'0.35', opacity:'0.04'
        }));
      }
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'2',  fill:inkColor, opacity:'0.22' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'10', fill:'none', stroke:inkColor, 'stroke-width':'0.4', opacity:'0.07' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'24', fill:'none', stroke:inkColor, 'stroke-width':'0.25', opacity:'0.04' }));
      frag.appendChild(el('circle', { cx:lx, cy:ly, r:'50', fill:'none', stroke:inkColor, 'stroke-width':'0.15', opacity:'0.02' }));
      break;
    }

    case 'warm_lines': {
      // Gentle diagonal lines — like warm light through blinds
      const angle = 0.18 + r() * 0.12;
      const gap = 48 + r() * 28;
      for (let i = 0; i < 14; i++) {
        const offset = i * gap - 200;
        const op = 0.02 + (i % 3 === 0 ? 0.025 : 0);
        frag.appendChild(el('line', {
          x1: offset, y1: 0,
          x2: offset + H * Math.tan(angle), y2: H,
          stroke:inkColor, 'stroke-width':'0.5', opacity:s(op)
        }));
      }
      // Small warm dot
      const dx = 60 + r() * 270, dy = 60 + r() * 160;
      frag.appendChild(el('circle', { cx:dx, cy:dy, r:'1.5', fill:inkColor, opacity:'0.16' }));
      frag.appendChild(el('circle', { cx:dx, cy:dy, r:'7',   fill:'none', stroke:inkColor, 'stroke-width':'0.3', opacity:'0.05' }));
      break;
    }

    case 'soft_grid': {
      // Very faint regular grid — calm, diffuse feel
      const gapX = 44, gapY = 44;
      for (let x = gapX; x < W; x += gapX) {
        frag.appendChild(el('line', { x1:x, y1:0, x2:x, y2:H, stroke:inkColor, 'stroke-width':'0.3', opacity:'0.03' }));
      }
      for (let y = gapY; y < H; y += gapY) {
        frag.appendChild(el('line', { x1:0, y1:y, x2:W, y2:y, stroke:inkColor, 'stroke-width':'0.3', opacity:'0.025' }));
      }
      break;
    }

    case 'minimal':
    default: {
      // Almost nothing — just a single thin horizontal line and one dot
      const y = H * (0.55 + r() * 0.2);
      frag.appendChild(el('line', { x1:40, y1:y, x2:W-40, y2:y, stroke:inkColor, 'stroke-width':'0.4', opacity:'0.06' }));
      const dx = 60 + r() * 270, dy = 60 + r() * 160;
      frag.appendChild(el('circle', { cx:dx, cy:dy, r:'1.2', fill:inkColor, opacity:'0.12' }));
      break;
    }
  }
  return frag;
}

// GENERATE

function generateToday() {
  const seed    = getViennaDateString();
  const subject = saltedPick(subjects,     seed, 'subject');
  const lighting= saltedPick(lightings,    seed, 'lighting');
  const persp   = saltedPick(perspectives, seed, 'perspective');
  const comp    = saltedPick(compositions, seed, 'composition');
  const refl    = saltedPick(reflections,  seed, 'reflection');
  const quote   = saltedPick(quotes,       seed, 'quote');
  const tmpl    = saltedPick(templates,    seed, 'template');
  const gtype   = getGraphicType(subject, lighting.phrase);
  return { sentence: tmpl(subject, lighting.phrase, persp, comp), refl, quote, mood: lighting.mood, seed, gtype };
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function getSecondsUntilNext6() {
  const now = new Date();
  const s = now.toLocaleString('en-CA', {
    timeZone:'Europe/Vienna', hour12:false,
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
  const [dp,tp] = s.split(', ');
  const [year,month,day] = dp.split('-').map(Number);
  const [hour,min,sec]   = tp.split(':').map(Number);
  const dec = hour + min/60 + sec/3600;
  let tY=year, tM=month, tD=day;
  if (dec >= 6) {
    const t = new Date(Date.UTC(year,month-1,day+1));
    tY=t.getUTCFullYear(); tM=t.getUTCMonth()+1; tD=t.getUTCDate();
  }
  const sample  = new Date(Date.UTC(tY,tM-1,tD,5,0,0));
  const sVienna = new Date(sample.toLocaleString('en-US',{timeZone:'Europe/Vienna'}));
  const off     = -(sample-sVienna)/3_600_000;
  const next6   = new Date(Date.UTC(tY,tM-1,tD,6-off,0,0));
  return Math.max(0, Math.floor((next6-now)/1000));
}

function formatTimer(t) {
  const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60;
  return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

function formatDateLabel(seed) {
  const [y,mo,d] = seed.split('-').map(Number);
  const months=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  return `${d}. ${months[mo-1]} ${y}`;
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const $prompt    = document.getElementById('prompt');
const $refl      = document.getElementById('reflection');
const $qText     = document.getElementById('quote-text');
const $qAuth     = document.getElementById('quote-author');
const $timer     = document.getElementById('timer');
const $dateLbl   = document.getElementById('date-label');
const $wrap      = document.getElementById('prompt-wrap');
const $bgLayer   = document.getElementById('bg-layer');

function nl2br(str) { return str.split('\n').join('<br>'); }

function applyMoodColors(mood) {
  const bg  = moodBg[mood]  || moodBg.neutral;
  const ink = moodInk[mood] || moodInk.neutral;
  document.body.style.background = bg;
  document.documentElement.style.background = bg;
  // Update CSS variables for text color consistency
  document.documentElement.style.setProperty('--ink',   ink);
  document.documentElement.style.setProperty('--muted', ink.replace('1C','6B').replace('17','65').replace('28','28'));
}

function render(data) {
  $prompt.innerHTML = nl2br(data.sentence);
  $refl.innerHTML   = nl2br(data.refl);
  $qText.innerHTML  = nl2br(data.quote.text);
  $qAuth.textContent = data.quote.author;
  $dateLbl.textContent = formatDateLabel(data.seed);
  applyMoodColors(data.mood);

  // Rebuild SVG graphic
  const ink = moodInk[data.mood] || moodInk.neutral;
  while ($bgLayer.firstChild) $bgLayer.removeChild($bgLayer.firstChild);
  $bgLayer.appendChild(buildGraphic(data.gtype, data.seed, ink));
}

// ── Tick ──────────────────────────────────────────────────────────────────────
let lastSeed = null;

function tick() {
  $timer.textContent = formatTimer(getSecondsUntilNext6());
  const newSeed = getViennaDateString();
  if (newSeed !== lastSeed) {
    const data = generateToday();
    if (lastSeed !== null) {
      $wrap.classList.add('out');
      setTimeout(() => { render(data); $wrap.classList.remove('out'); }, 550);
    } else {
      render(data);
    }
    lastSeed = newSeed;
  }
}

tick();
setInterval(tick, 1000);
</script>
