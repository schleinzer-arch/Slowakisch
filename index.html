// AUDIO
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text),vs=window.speechSynthesis.getVoices(),found=null;
  for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf("sk")===0){found=vs[i];break;}}
  if(!found)for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf("cs")===0){found=vs[i];break;}}
  if(found)u.voice=found;u.lang="sk-SK";u.rate=0.88;
  window.speechSynthesis.speak(u);
}
